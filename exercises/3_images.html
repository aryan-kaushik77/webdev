<!DOCTYPE html>
<html>
    <head>
        <title>Image exercise</title>
        <style>
            .thumbnail1{
                width: 100px;
                height: 100px;                
                border-radius: 50px;
                object-fit: cover;
                object-position: center;
                /* image keeps it shape if we dont put height out there */
                /* cover is to make like border and contain for image shape */
            }
            .thumbnail2{
                width: 150px;
                height: 150px;


                /* image keeps it shape if we dont put height out there */
            }
        </style>
    </head>
    <body>
        <img class="thumbnail1" src="thumbnail-1.webp">
        <img class="thumbnail2" src="thumbnail-1.webp">
        
    </body>
</html>
