<style>
    .one {
        background-color: green;
        color: white;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 15px;
        margin-left: 15px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 16px;
        padding-right: 16px;
        transition: opacity 0.15s;
        vertical-align: top;
    }
    .two {
        background-color: white;
        border-color: rgb(6, 95, 212);
        border-style: solid;
        border-width: 1px;
        color: rgb(6, 95, 212);
        border-radius: 2px;
        cursor: pointer;
        margin-right: 15px;
        margin-left: 15px;
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 16px;
        padding-right: 16px;
    
        transition: background-color 0.15s,
        color 0.15s;
    }
     
    .three {
        background-color: rgb(29, 155, 240);
        color: white;        
        margin-right: 15px;
        margin-left: 15px;
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 16px;
        padding-right: 16px;        
        border-radius: 8px;
        border-radius: 18px;
        font-weight: bold;
    }
    .one:hover {
        margin-right: 5px;
        margin-left: 8px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 35px;
        padding-right: 35px;
        opacity: 0.8;
    }
    .two:hover {
        margin-right: 5px;
        margin-left: 8px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 35px;
        padding-right: 35px;
        opacity: 0.8;
    }.three:hover {
        margin-right: 5px;
        margin-left: 8px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 35px;
        padding-right: 35px;
        opacity: 0.8;
    }

    
    
</style>
<button class="one">
  ONE
</button>
<button class="two">
  TWO
</button>
<button class="three">
  THREE
</button>
